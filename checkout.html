</div>

        <div class="container">
            <div class="checkout-form">
                <h2>Оформлення</h2>
                <p>Будь ласка, залиште інформацію про себе у полях нижче. Ми зв’яжемося з вами по телефону та обговоримо всі деталі замовлення.</p>
                <input type="text" id="Name" placeholder="Ім'я">
                <input type="tel" id="phone" placeholder="Телефон">
                <button class="button" onclick="submitOrder()">Відправити повідомлення</button>
            </div>
        </div>

    </footer>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const cart = [];

        urlParams.forEach((value, key) => {
            if (key === 'item') {
                cart.push(JSON.parse(decodeURIComponent(value)));
            }
        });

        function submitOrder() {
            const Name = document.getElementById('Name').value;
            const phone = document.getElementById('phone').value;

            if (!Name || !phone) {
                alert('Будь ласка, заповніть всі поля.');
                return;
            }

            fetch('sendmail.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    Name,
                    phone,
                    cart
                })
            })
            .then(response => response.text())
            .then(data => {
                alert(data);
                window.location.href = 'index.php';
            })
            .catch(error => {
                console.error('Помилка, спробуйте пізніше:', error);
            });
        }
        function startSearch() {
    const input = document.getElementById('searchInput');
    const query = input.value.trim();
    if (query.length < 2) {
        document.getElementById('suggestions').innerHTML = '<div class="suggestion-item">Введіть більше символів</div>';
        return;
    }

    fetch('search.php?q=' + encodeURIComponent(query))
        .then(response => response.json())
        .then(data => {
            const suggestionsBox = document.getElementById('suggestions');
            suggestionsBox.innerHTML = '';

            if (data.length === 0) {
                suggestionsBox.innerHTML = '<div class="suggestion-item">Нічого не знайдено</div>';
                return;
            }

            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.onclick = () => {
                    window.location.href = 'katalog.php?ids=' + item.ID;
                };

                const img = document.createElement('img');
                img.src = item.image;
                img.alt = item.name;

                const text = document.createElement('span');
                text.textContent = item.name;
                text.style.flex = '1';

                div.appendChild(img);
                div.appendChild(text);
                suggestionsBox.appendChild(div);
            });
        });
}
    </script>
