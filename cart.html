    <script>
    function loadCart() {
    const cart = localStorage.getItem('cart') ? JSON.parse(localStorage.getItem('cart')) : [];
    const cartItems = document.getElementById('cart-items');
    let total = 0;
    cartItems.innerHTML = '';  

    cart.forEach((item, index) => {
        const cartItem = document.createElement('div');
        cartItem.className = 'cart-item';

        // Фото
        const itemImage = document.createElement('img');
        itemImage.src = item.image && item.image.trim() ? item.image : './png/placehold.png';
        itemImage.alt = item.name || 'Изображение недоступно';

        // Название
        const itemName = document.createElement('p');
        itemName.className = 'item-name';
        itemName.textContent = item.name;

        // Количество
        const itemQuantity = document.createElement('p');
        itemQuantity.className = 'item-quantity';
        itemQuantity.textContent = `Кількість: ${item.quantity}`;

        // Цена
        const cartItemPrice = document.createElement('p');
        cartItemPrice.className = 'cart-item-price';
        item.price = Number(keepOnlyNumbers(String(item.price)));
        cartItemPrice.textContent = `${item.price} грн.`;

        // Кнопка удаления
        const cartItemRemove = document.createElement('div');
        cartItemRemove.className = 'cart-item-remove';
        const removeButton = document.createElement('button');
        removeButton.textContent = 'Видалити';
        removeButton.onclick = () => removeFromCart(index); 
        cartItemRemove.appendChild(removeButton);

        // Добавляем элементы в `.cart-item`
        cartItem.appendChild(itemImage);
        cartItem.appendChild(itemName);
        cartItem.appendChild(itemQuantity);
        cartItem.appendChild(cartItemPrice);
        cartItem.appendChild(cartItemRemove);

        cartItems.appendChild(cartItem);

        total += item.price * item.quantity;
    });

    document.getElementById('total-price').innerText = total;
}





    function removeFromCart(index) {
    let cart = JSON.parse(localStorage.getItem('cart'));

    if (cart[index].quantity > 1) {
        // Если количество товара больше одного, уменьшаем количество на 1
        cart[index].quantity -= 1;
    } else {
        // Если товар один, удаляем его из корзины
        cart.splice(index, 1);
    }

    localStorage.setItem('cart', JSON.stringify(cart));
    loadCart();  // Обновляем корзину на странице
}

    function keepOnlyNumbers(input) {
            return input.replace(/\D/g, ""); // Удаляем всё, кроме цифр
    }
        
    function redirectToCheckout() {
        const query = JSON.parse(localStorage.getItem('cart')).map(item => `item=${encodeURIComponent(JSON.stringify(item))}`).join('&');
        window.location.href = `checkout.html?${query}`;
    }

    function startSearch() {
    const input = document.getElementById('searchInput');
    const query = input.value.trim();
    if (query.length < 2) {
        document.getElementById('suggestions').innerHTML = '<div class="suggestion-item">Введіть більше символів</div>';
        return;
    }

    fetch('search.php?q=' + encodeURIComponent(query))
        .then(response => response.json())
        .then(data => {
            const suggestionsBox = document.getElementById('suggestions');
            suggestionsBox.innerHTML = '';

            if (data.length === 0) {
                suggestionsBox.innerHTML = '<div class="suggestion-item">Нічого не знайдено</div>';
                return;
            }

            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.onclick = () => {
                    window.location.href = 'katalog.php?ids=' + item.ID;
                };

                const img = document.createElement('img');
                img.src = item.image;
                img.alt = item.name;

                const text = document.createElement('span');
                text.textContent = item.name;
                text.style.flex = '1';

                div.appendChild(img);
                div.appendChild(text);
                suggestionsBox.appendChild(div);
            });
        });
}
    loadCart();
</script>
